name = "offline-pos"
main = "workers-site/index.js"
compatibility_date = "2025-02-09"

# Workers Sites 設定 - 需要先創建 KV namespace
[[kv_namespaces]]
binding = "__STATIC_CONTENT"
id = "your_kv_namespace_id_here"

# 靜態資源設定
[site]
bucket = "./dist"

# 可選：自訂域名
# [[routes]]
# pattern = "pos.yourdomain.com"
# custom_domain = true
